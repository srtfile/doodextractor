name: Extract DoodStream URL

on:
  workflow_dispatch:
    inputs:
      url_or_id:
        description: "DoodStream URL or video ID"
        required: true
        default: "https://dood.watch/e/qjw686j2lvvs"

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests cloudscraper

      - name: Run extractor
        env:
          # Store your residential proxy URL in repo Settings → Secrets → Actions
          # Name: DOOD_PROXY
          # Value: http://user:pass@host:port   (or socks5://...)
          DOOD_PROXY: ${{ secrets.DOOD_PROXY }}
        run: |
          python dood_extract.py "${{ github.event.inputs.url_or_id }}"
