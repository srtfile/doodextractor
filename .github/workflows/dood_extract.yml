name: Extract DoodStream URL

on:
  workflow_dispatch:
    inputs:
      url_or_id:
        description: "DoodStream URL or bare video ID"
        required: true
        default: "https://dood.watch/e/qjw686j2lvvs"

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests cloudscraper

      - name: Run extractor
        # Proxies are baked into the script - no secret needed.
        # If you want to use a different proxy, add DOOD_PROXY as a repo secret.
        run: |
          python dood_extract.py "${{ github.event.inputs.url_or_id }}"
