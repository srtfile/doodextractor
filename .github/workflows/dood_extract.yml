name: Dood Extractor

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Dood URL or Video ID"
        required: true
        default: "https://dood.watch/e/qjw686j2lvvs"

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper

      - name: Run extractor
        run: |
          python dood_extract.py "${{ github.event.inputs.target }}"

      - name: Save output
        run: |
          python dood_extract.py "${{ github.event.inputs.target }}" > result.txt

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: dood-result
          path: result.txt
